# version: "3.9" - commented out this line as it's obsolete in docker now.
services:
  backend:
    build: ./backend
    container_name: videovault-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # ← CHANGE THIS to your actual video folder path
      - /path/to/your/videos:/videos:ro
      # Thumbnails persist between restarts
      - videovault-thumbs:/app/thumbnails
    environment:
      - VIDEO_DIR=/videos
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: videovault-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  videovault-thumbs:
